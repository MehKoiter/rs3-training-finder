<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RS3 Training Spot Finder</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f7f6f3; --surface: #ffffff; --surface-2: #f2f1ee;
      --border: #e2e0db; --border-strong: #c8c5bf;
      --text: #1a1916; --text-secondary: #6b6963; --text-muted: #9e9b95;
      --accent: #b5451b; --accent-bg: #fdf0eb; --accent-text: #8c3113;
      --green-bg: #eaf4ee; --green-text: #2a6b3c;
      --amber-bg: #fdf4e3; --amber-text: #8a5c10;
      --blue-bg: #e8f0fd; --blue-text: #1a4d9e;
      --red-bg: #fdeaea; --red-text: #8c1f1f;
      --radius: 8px;
      --shadow: 0 1px 3px rgba(0,0,0,.07), 0 1px 8px rgba(0,0,0,.04);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1916; --surface: #242220; --surface-2: #2e2c29;
        --border: #3a3835; --border-strong: #4e4b47;
        --text: #f0ede8; --text-secondary: #9e9b95; --text-muted: #6b6963;
        --accent: #e0623b; --accent-bg: #2e1a12; --accent-text: #f09070;
        --green-bg: #132b1c; --green-text: #6bbf82;
        --amber-bg: #2a1e0a; --amber-text: #d4a04a;
        --blue-bg: #0e1e3a; --blue-text: #6699ee;
        --red-bg: #2e1212; --red-text: #f08080;
      }
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 15px; line-height: 1.5; min-height: 100vh; padding-bottom: 4rem;
    }
    header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 1.25rem 1.5rem; display: flex; align-items: center; gap: 12px;
      position: sticky; top: 0; z-index: 10;
    }
    .logo { width: 36px; height: 36px; background: var(--accent); border-radius: var(--radius); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    header h1 { font-size: 17px; font-weight: 600; letter-spacing: -.01em; }
    header p { font-size: 13px; color: var(--text-secondary); }
    .wiki-badge { margin-left: auto; font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
    .wiki-badge a { color: var(--accent-text); text-decoration: none; }
    .wiki-badge a:hover { text-decoration: underline; }
    .container { max-width: 720px; margin: 0 auto; padding: 1.5rem 1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; box-shadow: var(--shadow); }
    .card-title { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 1rem; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    @media (max-width: 500px) { .grid3 { grid-template-columns: 1fr 1fr; } }
    .field label { display: block; font-size: 12px; color: var(--text-secondary); font-weight: 500; margin-bottom: 5px; }
    input[type=number], select { width: 100%; height: 38px; padding: 0 10px; border-radius: var(--radius); border: 1px solid var(--border-strong); background: var(--surface-2); color: var(--text); font-size: 14px; font-family: inherit; transition: border-color .15s; -webkit-appearance: none; }
    input[type=number]:focus, select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 15%, transparent); }
    .divider { height: 1px; background: var(--border); margin: 1rem 0; }
    .btn-group { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .btn-toggle { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border-strong); background: var(--surface-2); color: var(--text-secondary); font-size: 13px; font-family: inherit; cursor: pointer; transition: all .15s; white-space: nowrap; }
    .btn-toggle:hover { border-color: var(--accent); color: var(--accent); }
    .btn-toggle.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 500; }
    .find-btn { width: 100%; height: 44px; border-radius: var(--radius); border: none; background: var(--accent); color: #fff; font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer; margin-top: .5rem; transition: opacity .15s, transform .1s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .find-btn:hover { opacity: .9; }
    .find-btn:active { transform: scale(.99); }
    .find-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status-bar { font-size: 12px; color: var(--text-muted); padding: .5rem 0; display: flex; align-items: center; gap: 6px; min-height: 28px; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted); flex-shrink: 0; }
    .status-dot.live { background: #2a6b3c; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }
    .results-header { font-size: 13px; color: var(--text-muted); margin-bottom: .75rem; }
    .enemy-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: .75rem; display: grid; grid-template-columns: 1fr auto; gap: 14px; box-shadow: var(--shadow); transition: border-color .15s; }
    .enemy-card:hover { border-color: var(--border-strong); }
    .enemy-name { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
    .enemy-name a { color: inherit; text-decoration: none; }
    .enemy-name a:hover { color: var(--accent); }
    .enemy-meta { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
    .tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
    .tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
    .tag-green  { background: var(--green-bg);  color: var(--green-text); }
    .tag-blue   { background: var(--blue-bg);   color: var(--blue-text); }
    .tag-amber  { background: var(--amber-bg);  color: var(--amber-text); }
    .tag-accent { background: var(--accent-bg); color: var(--accent-text); }
    .tag-red    { background: var(--red-bg);    color: var(--red-text); }
    .stat-col { text-align: right; flex-shrink: 0; min-width: 76px; }
    .stat-item { margin-bottom: 8px; }
    .stat-label { font-size: 10px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }
    .stat-val { font-size: 13px; font-weight: 500; }
    .wpill { display: inline-block; padding: 1px 7px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .error-box { background: var(--red-bg); border: 1px solid var(--red-text); border-radius: var(--radius); padding: 1rem; color: var(--red-text); font-size: 13px; }
    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-muted); }
    .empty-state i { font-size: 40px; display: block; margin-bottom: .75rem; opacity: .5; }
    .empty-state p { font-size: 14px; }
    footer { text-align: center; font-size: 12px; color: var(--text-muted); padding-top: 2rem; }
    footer a { color: var(--accent-text); text-decoration: none; }
  </style>
</head>
<body>

<header>
  <div class="logo">&#9876;</div>
  <div>
    <h1>RS3 Training Spot Finder</h1>
    <p>Live monster data from the RS3 Wiki</p>
  </div>
  <div class="wiki-badge">
    <i class="ti ti-book" style="font-size:14px" aria-hidden="true"></i>
    <a href="https://runescape.wiki" target="_blank" rel="noopener">runescape.wiki</a>
  </div>
</header>

<div class="container">

  <div class="card">
    <div class="card-title">Your combat stats</div>
    <div class="grid3">
      <div class="field"><label>Combat level</label><input type="number" id="combat" value="50" min="3" max="138"></div>
      <div class="field"><label>Attack</label><input type="number" id="atk" value="50" min="1" max="99"></div>
      <div class="field"><label>Strength</label><input type="number" id="str" value="50" min="1" max="99"></div>
      <div class="field"><label>Defence</label><input type="number" id="def" value="50" min="1" max="99"></div>
      <div class="field"><label>Constitution</label><input type="number" id="hp" value="50" min="10" max="99"></div>
      <div class="field"><label>Prayer</label><input type="number" id="pray" value="37" min="1" max="99"></div>
    </div>
    <div class="divider"></div>
    <div class="grid2">
      <div class="field"><label>Ranged</label><input type="number" id="ranged" value="1" min="1" max="99"></div>
      <div class="field"><label>Magic</label><input type="number" id="magic" value="1" min="1" max="99"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Filters</div>
    <div style="margin-bottom:1rem">
      <div class="field" style="margin-bottom:6px"><label>Combat style (filters by weakness)</label></div>
      <div class="btn-group" id="style-group">
        <button class="btn-toggle active" data-val="any">Any style</button>
        <button class="btn-toggle" data-val="melee">&#9876; Melee</button>
        <button class="btn-toggle" data-val="ranged">&#127993; Ranged</button>
        <button class="btn-toggle" data-val="magic">&#127358; Magic</button>
      </div>
    </div>
    <div style="margin-bottom:1rem">
      <div class="field" style="margin-bottom:6px"><label>Membership</label></div>
      <div class="btn-group" id="members-group">
        <button class="btn-toggle active" data-val="any">Both</button>
        <button class="btn-toggle" data-val="members">Members only</button>
        <button class="btn-toggle" data-val="f2p">F2P only</button>
      </div>
    </div>
    <div class="grid2">
      <div class="field"><label>Enemy combat level — min</label><input type="number" id="minlvl" value="1" min="1" max="10000"></div>
      <div class="field"><label>Enemy combat level — max</label><input type="number" id="maxlvl" value="200" min="1" max="10000"></div>
    </div>
  </div>

  <button class="find-btn" id="find-btn" onclick="findEnemies()">
    <span class="spinner" id="spinner"></span>
    <span id="btn-label">Search the wiki</span>
  </button>

  <div class="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Enter your stats and press search</span>
  </div>

  <div id="results"></div>

  <footer>
    Monster data sourced live from <a href="https://runescape.wiki" target="_blank" rel="noopener">runescape.wiki</a>
    under <a href="https://creativecommons.org/licenses/by-nc-sa/3.0/" target="_blank" rel="noopener">CC BY-NC-SA 3.0</a>.
    Not affiliated with Jagex.
  </footer>
</div>

<script>
  var combatStyle = 'any', membersFilter = 'any';

  function bindGroup(groupId, setter) {
    var btns = document.getElementById(groupId).querySelectorAll('.btn-toggle');
    btns.forEach(function(b) {
      b.addEventListener('click', function() {
        btns.forEach(function(x) { x.classList.remove('active'); });
        b.classList.add('active');
        setter(b.dataset.val);
      });
    });
  }
  bindGroup('style-group',   function(v) { combatStyle   = v; });
  bindGroup('members-group', function(v) { membersFilter = v; });

  var WEAKNESS_STYLES = {
    slash: 'melee', stab: 'melee', crush: 'melee',
    arrow: 'ranged', bolt: 'ranged', ranged: 'ranged', thrown: 'ranged',
    magic: 'magic', fire: 'magic', water: 'magic', air: 'magic', earth: 'magic'
  };

  function styleMatchesWeakness(weakness, style) {
    if (style === 'any' || !weakness) return true;
    var w = weakness.toLowerCase().trim();
    var keys = Object.keys(WEAKNESS_STYLES);
    for (var i = 0; i < keys.length; i++) {
      if (w.indexOf(keys[i]) !== -1) return WEAKNESS_STYLES[keys[i]] === style;
    }
    return true;
  }

  function weaknessBadge(weakness) {
    if (!weakness || weakness === 'N/A' || weakness === 'None' || weakness === '') {
      return '<span class="wpill tag-accent">None</span>';
    }
    var w = weakness.toLowerCase();
    var cls = 'tag-blue';
    if (['slash','stab','crush'].some(function(s){return w.indexOf(s)!==-1;})) cls = 'tag-accent';
    else if (['arrow','bolt','ranged','thrown'].some(function(s){return w.indexOf(s)!==-1;})) cls = 'tag-green';
    else if (['magic','fire','water','air','earth'].some(function(s){return w.indexOf(s)!==-1;})) cls = 'tag-amber';
    return '<span class="wpill ' + cls + '">' + weakness + '</span>';
  }

  function setStatus(msg, live) {
    document.getElementById('status-text').textContent = msg;
    document.getElementById('status-dot').className = 'status-dot' + (live ? ' live' : '');
  }

  function setLoading(on) {
    var btn = document.getElementById('find-btn');
    btn.disabled = on;
    document.getElementById('spinner').style.display = on ? 'block' : 'none';
    document.getElementById('btn-label').textContent = on ? 'Searching wiki...' : 'Search the wiki';
  }

  function findEnemies() {
    var minLvl = parseInt(document.getElementById('minlvl').value) || 1;
    var maxLvl = parseInt(document.getElementById('maxlvl').value) || 200;
    if (minLvl > maxLvl) { setStatus('Min level must be less than max level', false); return; }

    setLoading(true);
    setStatus('Querying the RS3 Wiki...', false);
    document.getElementById('results').innerHTML = '';

    queryWikiSMW(minLvl, maxLvl).then(function(monsters) {
      renderResults(monsters);
    }).catch(function(err) {
      document.getElementById('results').innerHTML =
        '<div class="error-box"><strong>Couldn\'t reach the RS3 Wiki.</strong><br>Check your internet connection and try again.<br><small style="opacity:.7;display:block;margin-top:4px">' + err.message + '</small></div>';
      setStatus('Error — could not connect to the wiki', false);
    }).finally(function() {
      setLoading(false);
    });
  }

  function queryWikiSMW(minLvl, maxLvl) {
    // SMW ask query — RS3 wiki uses Semantic MediaWiki (action=ask), not Cargo
    // Query monsters within the combat level range with the properties we need
    var smwQuery = '[[Category:Monsters]]' +
      '[[Combat level::>=' + minLvl + ']]' +
      '[[Combat level::<=' + maxLvl + ']]' +
      '|?Combat level' +
      '|?Weakness' +
      '|?Slayer level' +
      '|?Location' +
      '|?Is members only' +
      '|?Is aggressive' +
      '|?Is poisonous' +
      '|?Life points' +
      '|?Experience' +
      '|limit=500' +
      '|offset=0';

    var url = 'https://runescape.wiki/api.php?action=ask&format=json&origin=*&query=' + encodeURIComponent(smwQuery);

    return fetch(url).then(function(res) {
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    }).then(function(data) {
      if (data.error) throw new Error(data.error.info || JSON.stringify(data.error));
      var results = data.query && data.query.results ? data.query.results : {};
      return parseSMWResults(results);
    });
  }

  function getVal(printout) {
    if (!printout || !printout.length) return '';
    var v = printout[0];
    if (typeof v === 'string') return v;
    if (typeof v === 'number') return v;
    if (v && typeof v === 'object') {
      if (v.fulltext) return v.fulltext;
      if (v.item) return v.item;
    }
    return String(v);
  }

  function parseSMWResults(results) {
    var monsters = [];
    for (var page in results) {
      if (!results.hasOwnProperty(page)) continue;
      var r = results[page];
      var po = r.printouts || {};
      monsters.push({
        name:       r.displaytitle || page.replace(/_/g, ' '),
        page:       page,
        combat:     getVal(po['Combat level']),
        weakness:   getVal(po['Weakness']),
        slaylvl:    getVal(po['Slayer level']),
        location:   getVal(po['Location']),
        members:    getVal(po['Is members only']),
        aggressive: getVal(po['Is aggressive']),
        poisonous:  getVal(po['Is poisonous']),
        lifepoints: getVal(po['Life points']),
        experience: getVal(po['Experience'])
      });
    }
    // Sort by combat level ascending
    monsters.sort(function(a, b) {
      return (parseInt(a.combat) || 0) - (parseInt(b.combat) || 0);
    });
    return monsters;
  }

  function renderResults(raw) {
    // Filter by style preference
    var monsters = raw.filter(function(m) {
      return styleMatchesWeakness(m.weakness, combatStyle);
    });

    // Filter by membership
    if (membersFilter === 'members') {
      monsters = monsters.filter(function(m) {
        var v = (m.members || '').toLowerCase();
        return v === 'yes' || v === 'true' || v === '1';
      });
    } else if (membersFilter === 'f2p') {
      monsters = monsters.filter(function(m) {
        var v = (m.members || '').toLowerCase();
        return v === 'no' || v === 'false' || v === '0' || v === '';
      });
    }

    // Dedupe by name
    var seen = {};
    monsters = monsters.filter(function(m) {
      var key = (m.name || '').toLowerCase().trim();
      if (seen[key]) return false;
      seen[key] = true;
      return true;
    });

    var div = document.getElementById('results');

    if (monsters.length === 0) {
      div.innerHTML = '<div class="empty-state"><i class="ti ti-mood-sad"></i><p>No monsters found for these filters.<br>Try widening the level range or selecting "Any style".</p></div>';
      setStatus('No results found', false);
      return;
    }

    var shown = monsters.slice(0, 100);
    setStatus(monsters.length + ' monster' + (monsters.length !== 1 ? 's' : '') + ' found — live data from runescape.wiki', true);

    div.innerHTML = '<p class="results-header">Showing ' + shown.length + ' of ' + monsters.length + ' monsters, sorted by combat level</p>' +
      shown.map(function(m) {
        var name    = m.name || 'Unknown';
        var page    = m.page || name;
        var wikiUrl = 'https://runescape.wiki/w/' + encodeURIComponent(page.replace(/ /g, '_'));
        var combat  = m.combat || '?';
        var hp      = m.lifepoints ? Number(m.lifepoints).toLocaleString() : '?';
        var rawXp   = parseFloat(m.experience);
        var xp      = isNaN(rawXp) ? '?' : rawXp.toFixed(1);
        var loc     = (m.location || 'Unknown location').split(',')[0].trim();
        var slayLvl = m.slaylvl && m.slaylvl !== '0' ? m.slaylvl : null;

        var isMember = (m.members || '').toLowerCase();
        var isAggro  = (m.aggressive || '').toLowerCase();
        var isPoison = (m.poisonous || '').toLowerCase();

        var tags = [];
        if (isMember === 'yes' || isMember === 'true') tags.push({ text: 'Members', cls: 'tag-blue' });
        else tags.push({ text: 'F2P', cls: 'tag-green' });
        if (isAggro  === 'yes' || isAggro  === 'true') tags.push({ text: 'Aggressive', cls: 'tag-red' });
        if (isPoison === 'yes' || isPoison === 'true') tags.push({ text: 'Poisonous',  cls: 'tag-amber' });
        if (slayLvl) tags.push({ text: 'Slayer ' + slayLvl + '+', cls: 'tag-accent' });

        var tagHtml = tags.map(function(t) { return '<span class="tag ' + t.cls + '">' + t.text + '</span>'; }).join('');

        return '<div class="enemy-card">' +
          '<div>' +
            '<div class="enemy-name"><a href="' + wikiUrl + '" target="_blank" rel="noopener">' + name + ' <i class="ti ti-external-link" style="font-size:11px;opacity:.45" aria-hidden="true"></i></a></div>' +
            '<div class="enemy-meta"><i class="ti ti-map-pin" style="font-size:12px;vertical-align:-1px" aria-hidden="true"></i> ' + loc + '</div>' +
            '<div class="tags">' + tagHtml + '</div>' +
          '</div>' +
          '<div class="stat-col">' +
            '<div class="stat-item"><div class="stat-label">Combat</div><div class="stat-val">' + combat + '</div></div>' +
            '<div class="stat-item"><div class="stat-label">HP</div><div class="stat-val">' + hp + '</div></div>' +
            '<div class="stat-item"><div class="stat-label">XP / kill</div><div class="stat-val">' + xp + '</div></div>' +
            '<div class="stat-item"><div class="stat-label">Weak to</div><div class="stat-val">' + weaknessBadge(m.weakness) + '</div></div>' +
          '</div>' +
        '</div>';
      }).join('');
  }
</script>
</body>
</html>
