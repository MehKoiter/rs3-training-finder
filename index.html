<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RS3 Training Spot Finder</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0b0d10;
      --surface: #14171c;
      --surface-2: #1c1f26;
      --border: #2a2616;
      --border-strong: #52471e;
      --text: #e8d9a8;
      --text-secondary: #9e8c50;
      --text-muted: #5a5030;
      --accent: #c8a840;
      --accent-bg: #1c1508;
      --accent-text: #f0c860;
      --green-bg: #0c1e10; --green-text: #5cb870;
      --amber-bg: #1c1408; --amber-text: #c89040;
      --blue-bg: #0c1428; --blue-text: #6090d4;
      --red-bg: #1c0c0c; --red-text: #c86060;
      --gold-grad: linear-gradient(180deg, #d4aa50 0%, #7a5818 100%);
      --panel-grad: linear-gradient(180deg, #181c22 0%, #12151a 100%);
      --radius: 6px;
      --shadow: 0 4px 16px rgba(0,0,0,.6), 0 1px 4px rgba(0,0,0,.4);
    }
    body {
      background: var(--bg);
      background-image: radial-gradient(ellipse 80% 40% at 50% 0%, #1a1a0a 0%, transparent 60%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 15px; line-height: 1.5; min-height: 100vh; padding-bottom: 4rem;
    }
    header {
      background: linear-gradient(180deg, #1e1a10 0%, #12100a 100%);
      border-bottom: 2px solid #5a4e20;
      box-shadow: 0 2px 16px rgba(0,0,0,.7), 0 0 0 1px rgba(200,168,64,.06);
      padding: 1.1rem 1.5rem; display: flex; align-items: center; gap: 14px;
      position: sticky; top: 0; z-index: 10;
    }
    .logo {
      width: 38px; height: 38px;
      background: var(--gold-grad);
      border-radius: var(--radius);
      border: 1px solid #8a6820;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.15);
    }
    header h1 {
      font-family: 'Cinzel', serif;
      font-size: 16px; font-weight: 700; letter-spacing: .06em;
      color: var(--accent-text);
      text-shadow: 0 0 20px rgba(200,168,64,.4), 0 1px 3px rgba(0,0,0,.8);
    }
    header p { font-size: 12px; color: var(--text-muted); letter-spacing: .02em; }
    .wiki-badge { margin-left: auto; font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
    .wiki-badge a { color: var(--accent); text-decoration: none; }
    .wiki-badge a:hover { color: var(--accent-text); text-decoration: underline; }
    .container { max-width: 720px; margin: 0 auto; padding: 1.5rem 1rem; }
    .card {
      background: var(--panel-grad);
      border: 1px solid var(--border-strong);
      border-radius: 8px; padding: 1.25rem; margin-bottom: 1rem;
      box-shadow: var(--shadow), inset 0 1px 0 rgba(200,168,64,.07);
    }
    .card-title {
      font-family: 'Cinzel', serif;
      font-size: 10px; font-weight: 700; color: var(--accent);
      text-transform: uppercase; letter-spacing: .14em; margin-bottom: 1rem;
      padding-bottom: .5rem;
      border-bottom: 1px solid var(--border);
    }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    @media (max-width: 500px) { .grid3 { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 480px) {
      header { padding: .9rem 1rem; gap: 10px; }
      header h1 { font-size: 14px; }
      header p { display: none; }
      .wiki-badge { display: none; }
      .card { padding: 1rem; }
      .enemy-card { grid-template-columns: 1fr auto; padding: .875rem 1rem; }
      .monster-img { display: none; }
    }
    .field label { display: block; font-size: 11px; color: var(--text-secondary); font-weight: 500; margin-bottom: 5px; letter-spacing: .03em; }
    input[type=number], input[type=text], select {
      width: 100%; height: 38px; padding: 0 10px;
      border-radius: var(--radius); border: 1px solid var(--border-strong);
      background: #0e1116; color: var(--text);
      font-size: 14px; font-family: inherit;
      transition: border-color .15s, box-shadow .15s; -webkit-appearance: none; appearance: none;
    }
    input[type=number]:focus, input[type=text]:focus, select:focus {
      outline: none; border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(200,168,64,.18);
    }
    input[type=text]::placeholder { color: var(--text-muted); }
    .btn-suggest {
      width: 100%; margin-top: .75rem; padding: 7px 14px;
      border-radius: var(--radius); border: 1px solid var(--border-strong);
      background: transparent; color: var(--text-secondary);
      font-size: 12px; font-family: inherit; cursor: pointer; letter-spacing: .02em;
      transition: all .15s;
    }
    .btn-suggest:hover { border-color: var(--accent); color: var(--accent-text); }
    .copy-link-btn {
      margin-left: auto; padding: 3px 10px; border-radius: 20px;
      border: 1px solid var(--border-strong); background: transparent;
      color: var(--text-muted); font-size: 11px; font-family: inherit;
      cursor: pointer; transition: all .15s; flex-shrink: 0;
      display: flex; align-items: center; gap: 4px;
    }
    .copy-link-btn:hover { border-color: var(--accent); color: var(--accent-text); }
    .divider { height: 1px; background: linear-gradient(90deg, transparent, var(--border-strong), transparent); margin: 1rem 0; }
    .btn-group { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .btn-toggle {
      padding: 6px 14px; border-radius: 20px;
      border: 1px solid var(--border-strong);
      background: #0e1116; color: var(--text-secondary);
      font-size: 12px; font-family: inherit; cursor: pointer;
      transition: all .15s; white-space: nowrap;
    }
    .btn-toggle:hover { border-color: var(--accent); color: var(--accent-text); }
    .btn-toggle.active {
      background: var(--gold-grad); border-color: #8a6820;
      color: #fff8e8; font-weight: 600;
      text-shadow: 0 1px 2px rgba(0,0,0,.5);
      box-shadow: 0 1px 6px rgba(0,0,0,.4);
    }
    .find-btn {
      width: 100%; height: 46px; border-radius: var(--radius);
      border: 1px solid #8a6820;
      background: var(--gold-grad);
      color: #fff8e8; font-size: 15px; font-weight: 700;
      font-family: 'Cinzel', serif; letter-spacing: .06em;
      cursor: pointer; margin-top: .5rem;
      transition: filter .15s, transform .1s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      text-shadow: 0 1px 3px rgba(0,0,0,.6);
      box-shadow: 0 3px 12px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.12);
    }
    .find-btn:hover { filter: brightness(1.12); }
    .find-btn:active { transform: scale(.99); filter: brightness(.93); }
    .find-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; filter: none; }
    .btn-reset {
      width: 100%; height: 38px; border-radius: var(--radius);
      border: 1px solid var(--border-strong); background: transparent;
      color: var(--text-secondary); font-size: 13px; font-family: inherit;
      cursor: pointer; margin-top: .4rem;
      transition: all .15s; display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-reset:hover { border-color: var(--accent); color: var(--accent-text); }
    .sort-dir-btn {
      padding: 0 10px; height: 100%; border-radius: 0 var(--radius) var(--radius) 0;
      border: 1px solid var(--border-strong); border-left: none;
      background: #0e1116; color: var(--text-secondary);
      font-size: 13px; font-family: inherit; cursor: pointer;
      transition: all .15s; flex-shrink: 0; white-space: nowrap;
    }
    .sort-dir-btn:hover { border-color: var(--accent); color: var(--accent-text); }
    .sort-with-dir { display: flex; }
    .sort-with-dir select { border-radius: var(--radius) 0 0 var(--radius); flex: 1; min-width: 0; }
    .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,248,232,.3); border-top-color: #fff8e8; border-radius: 50%; animation: spin .7s linear infinite; display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status-bar { font-size: 12px; color: var(--text-muted); padding: .5rem 0; display: flex; align-items: center; gap: 6px; min-height: 28px; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border-strong); flex-shrink: 0; }
    .status-dot.live { background: var(--accent); box-shadow: 0 0 6px rgba(200,168,64,.5); animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .3; } }
    .results-header { font-size: 12px; color: var(--text-muted); margin-bottom: .75rem; letter-spacing: .02em; }
    .enemy-card {
      background: var(--panel-grad);
      border: 1px solid var(--border-strong);
      border-radius: 8px; padding: 1rem 1.25rem; margin-bottom: .75rem;
      display: grid; grid-template-columns: 52px 1fr auto; gap: 14px;
      box-shadow: var(--shadow);
      transition: border-color .15s, box-shadow .15s;
    }
    .enemy-card:hover {
      border-color: var(--accent);
      box-shadow: var(--shadow), 0 0 12px rgba(200,168,64,.12);
    }
    .monster-img { align-self: center; width: 52px; height: 52px; display: flex; align-items: center; justify-content: center; }
    .monster-img img { max-width: 52px; max-height: 52px; width: auto; height: auto; object-fit: contain; }
    .enemy-name { font-family: 'Cinzel', serif; font-size: 15px; font-weight: 600; margin-bottom: 2px; letter-spacing: .02em; }
    .enemy-name a { color: var(--accent-text); text-decoration: none; }
    .enemy-name a:hover { color: var(--text); }
    .enemy-meta { font-size: 12px; color: var(--text-secondary); margin-top: 3px; }
    .loc-link { color: var(--text-secondary); text-decoration: none; border-bottom: 1px dotted var(--text-muted); }
    .loc-link:hover { color: var(--accent-text); border-bottom-color: var(--accent); }
    .tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
    .tag { font-size: 11px; padding: 2px 8px; border-radius: 3px; font-weight: 600; letter-spacing: .03em; }
    .tag-green  { background: var(--green-bg); color: var(--green-text); border: 1px solid rgba(92,184,112,.18); }
    .tag-blue   { background: var(--blue-bg);  color: var(--blue-text);  border: 1px solid rgba(96,144,212,.18); }
    .tag-amber  { background: var(--amber-bg); color: var(--amber-text); border: 1px solid rgba(200,144,64,.18); }
    .tag-accent { background: var(--accent-bg);color: var(--accent-text);border: 1px solid rgba(200,168,64,.18); }
    .tag-red    { background: var(--red-bg);   color: var(--red-text);   border: 1px solid rgba(200,96,96,.18); }
    .stat-col { text-align: right; flex-shrink: 0; min-width: 76px; }
    .stat-item { margin-bottom: 8px; }
    .stat-label { font-size: 10px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .08em; }
    .stat-val { font-size: 13px; font-weight: 500; color: var(--text); }
    .wpill { display: inline-block; padding: 1px 7px; border-radius: 3px; font-size: 11px; font-weight: 600; }
    .error-box { background: var(--red-bg); border: 1px solid rgba(200,96,96,.3); border-radius: var(--radius); padding: 1rem; color: var(--red-text); font-size: 13px; }
    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-muted); }
    .empty-state i { font-size: 40px; display: block; margin-bottom: .75rem; opacity: .4; color: var(--accent); }
    .empty-state p { font-size: 14px; }
    footer { text-align: center; font-size: 12px; color: var(--text-muted); padding-top: 2rem; }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { color: var(--accent-text); }
  </style>
</head>
<body>

<header>
  <div class="logo">&#9876;</div>
  <div>
    <h1>RS3 Training Spot Finder</h1>
    <p>Curated RS3 monster database</p>
  </div>
  <div class="wiki-badge">
    <i class="ti ti-book" style="font-size:14px" aria-hidden="true"></i>
    <a href="https://runescape.wiki" target="_blank" rel="noopener">runescape.wiki</a>
  </div>
</header>

<div class="container">

  <div class="card">
    <div class="card-title">Your combat stats</div>
    <div class="grid3">
      <div class="field"><label>Combat level</label><input type="number" id="combat" value="50" min="3" max="138"></div>
      <div class="field"><label>Attack</label><input type="number" id="atk" value="50" min="1" max="99"></div>
      <div class="field"><label>Strength</label><input type="number" id="str" value="50" min="1" max="99"></div>
      <div class="field"><label>Defence</label><input type="number" id="def" value="50" min="1" max="99"></div>
      <div class="field"><label>Constitution</label><input type="number" id="hp" value="50" min="10" max="99"></div>
      <div class="field"><label>Prayer</label><input type="number" id="pray" value="37" min="1" max="99"></div>
    </div>
    <div class="divider"></div>
    <div class="grid2">
      <div class="field"><label>Ranged</label><input type="number" id="ranged" value="1" min="1" max="99"></div>
      <div class="field"><label>Magic</label><input type="number" id="magic" value="1" min="1" max="99"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Filters</div>
    <div style="margin-bottom:1rem">
      <div class="field" style="margin-bottom:6px"><label>Combat style (filters by weakness)</label></div>
      <div class="btn-group" id="style-group">
        <button class="btn-toggle active" data-val="any">Any style</button>
        <button class="btn-toggle" data-val="melee">&#9876; Melee</button>
        <button class="btn-toggle" data-val="ranged">&#127993; Ranged</button>
        <button class="btn-toggle" data-val="magic">&#127358; Magic</button>
      </div>
    </div>
    <div style="margin-bottom:1rem">
      <div class="field" style="margin-bottom:6px"><label>Membership</label></div>
      <div class="btn-group" id="members-group">
        <button class="btn-toggle active" data-val="any">Both</button>
        <button class="btn-toggle" data-val="members">Members only</button>
        <button class="btn-toggle" data-val="f2p">F2P only</button>
      </div>
    </div>
    <div style="margin-bottom:1rem">
      <div class="field"><label>Search by name</label><input type="text" id="name-filter" placeholder="e.g. dragon, demon…" autocomplete="off"></div>
    </div>
    <div class="grid2" style="margin-bottom:1rem">
      <div class="field"><label>Enemy level — min</label><input type="number" id="minlvl" value="1" min="1" max="10000"></div>
      <div class="field"><label>Enemy level — max</label><input type="number" id="maxlvl" value="200" min="1" max="10000"></div>
    </div>
    <div style="margin-bottom:1rem">
      <div class="field" style="margin-bottom:6px"><label>Aggressiveness</label></div>
      <div class="btn-group" id="aggro-group">
        <button class="btn-toggle active" data-val="any">Any</button>
        <button class="btn-toggle" data-val="yes">&#128296; Aggressive only</button>
      </div>
    </div>
    <div style="margin-bottom:1rem">
      <div class="field" style="margin-bottom:6px"><label>Poisonous monsters</label></div>
      <div class="btn-group" id="poison-group">
        <button class="btn-toggle active" data-val="any">Show all</button>
        <button class="btn-toggle" data-val="hide">Hide poisonous</button>
      </div>
    </div>
    <div class="grid2">
      <div class="field"><label>Your Slayer level</label><input type="number" id="slayer" value="99" min="1" max="120"></div>
      <div class="field"><label>Sort by</label>
        <div class="sort-with-dir">
          <select id="sort-select">
            <option value="combat">Combat level</option>
            <option value="xp">XP / kill</option>
            <option value="hp">Life points</option>
            <option value="name">Name</option>
          </select>
          <button class="sort-dir-btn" id="sort-dir-btn" title="Toggle sort direction" onclick="toggleSortDir()">&#9650;</button>
        </div>
      </div>
    </div>
    <button class="btn-suggest" onclick="suggestLevelRange()">&#9876; Suggest level range for my combat level</button>
  </div>

  <button class="find-btn" id="find-btn" onclick="findEnemies()">
    <span class="spinner" id="spinner"></span>
    <span id="btn-label">Find training spots</span>
  </button>
  <button class="btn-reset" onclick="resetFilters()"><i class="ti ti-refresh" style="font-size:14px"></i> Reset all filters</button>

  <div class="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Enter your stats and press search</span>
    <button class="copy-link-btn" id="copy-link-btn" onclick="copyLink()" style="display:none">
      <i class="ti ti-link" style="font-size:12px"></i> Copy link
    </button>
  </div>

  <div id="results"></div>

  <footer>
    Monster data derived from <a href="https://runescape.wiki" target="_blank" rel="noopener">runescape.wiki</a>.
    Not affiliated with Jagex.
  </footer>
</div>

<script>
  var combatStyle = 'any', membersFilter = 'any', aggressiveFilter = 'any', poisonFilter = 'any', sortDir = 'asc';

  function bindGroup(groupId, setter) {
    var btns = document.getElementById(groupId).querySelectorAll('.btn-toggle');
    btns.forEach(function(b) {
      b.addEventListener('click', function() {
        btns.forEach(function(x) { x.classList.remove('active'); });
        b.classList.add('active');
        setter(b.dataset.val);
      });
    });
  }
  bindGroup('style-group',   function(v) { combatStyle      = v; saveState(); });
  bindGroup('members-group', function(v) { membersFilter    = v; saveState(); });
  bindGroup('aggro-group',   function(v) { aggressiveFilter = v; saveState(); });
  bindGroup('poison-group',  function(v) { poisonFilter     = v; saveState(); });

  function toggleSortDir() {
    sortDir = sortDir === 'asc' ? 'desc' : 'asc';
    document.getElementById('sort-dir-btn').innerHTML = sortDir === 'asc' ? '&#9650;' : '&#9660;';
    saveState();
  }

  var WEAKNESS_STYLES = {
    slash: 'melee', stab: 'melee', crush: 'melee',
    arrow: 'ranged', bolt: 'ranged', ranged: 'ranged', thrown: 'ranged',
    magic: 'magic', fire: 'magic', water: 'magic', air: 'magic', earth: 'magic'
  };

  function styleMatchesWeakness(weakness, style) {
    if (style === 'any' || !weakness) return true;
    var w = weakness.toLowerCase().trim();
    var keys = Object.keys(WEAKNESS_STYLES);
    for (var i = 0; i < keys.length; i++) {
      if (w.indexOf(keys[i]) !== -1) return WEAKNESS_STYLES[keys[i]] === style;
    }
    return true;
  }

  function weaknessBadge(weakness) {
    if (!weakness || weakness === 'N/A' || weakness === 'None' || weakness === '') {
      return '<span class="wpill tag-accent">None</span>';
    }
    var w = weakness.toLowerCase();
    var cls = 'tag-blue';
    if (['slash','stab','crush'].some(function(s){return w.indexOf(s)!==-1;})) cls = 'tag-accent';
    else if (['arrow','bolt','ranged','thrown'].some(function(s){return w.indexOf(s)!==-1;})) cls = 'tag-green';
    else if (['magic','fire','water','air','earth'].some(function(s){return w.indexOf(s)!==-1;})) cls = 'tag-amber';
    return '<span class="wpill ' + cls + '">' + weakness + '</span>';
  }

  function setStatus(msg, live) {
    document.getElementById('status-text').textContent = msg;
    document.getElementById('status-dot').className = 'status-dot' + (live ? ' live' : '');
  }

  function setLoading(on) {
    var btn = document.getElementById('find-btn');
    btn.disabled = on;
    document.getElementById('spinner').style.display = on ? 'block' : 'none';
    document.getElementById('btn-label').textContent = on ? 'Searching...' : 'Find training spots';
  }

  function findEnemies() {
    var minLvl = parseInt(document.getElementById('minlvl').value) || 1;
    var maxLvl = parseInt(document.getElementById('maxlvl').value) || 200;
    if (minLvl > maxLvl) { setStatus('Min level must be less than max level', false); return; }

    setLoading(true);
    setStatus('Searching...', false);
    document.getElementById('results').innerHTML = '';
    document.getElementById('copy-link-btn').style.display = 'none';
    updateUrl();

    filterMonsters(minLvl, maxLvl).then(function(monsters) {
      renderResults(monsters);
    }).finally(function() {
      setLoading(false);
    });
  }

  // XP per kill ≈ lifepoints × 0.4 (primary combat stat, approximate)
  var MONSTERS = [
    // ── F2P ──────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────
    {name:'Rat',                    page:'Rat',                          combat:1,   weakness:'Slash',        slaylvl:'',   location:'Lumbridge',               members:'no',  aggressive:'no',  poisonous:'no',  lifepoints:100,   experience:40},
    {name:'Chicken',                page:'Chicken',                      combat:3,   weakness:'Slash',        slaylvl:'',   location:'Lumbridge',               members:'no',  aggressive:'no',  poisonous:'no',  lifepoints:100,   experience:40},
    {name:'Man',                    page:'Man',                          combat:2,   weakness:'Slash',        slaylvl:'',   location:'Lumbridge',               members:'no',  aggressive:'no',  poisonous:'no',  lifepoints:100,   experience:40},
    {name:'Woman',                  page:'Woman',                        combat:2,   weakness:'Slash',        slaylvl:'',   location:'Lumbridge',               members:'no',  aggressive:'no',  poisonous:'no',  lifepoints:100,   experience:40},

  function filterMonsters(minLvl, maxLvl) {
    return Promise.resolve(
      MONSTERS.filter(function(m) { return m.combat >= minLvl && m.combat <= maxLvl; })
    );
  }

  function renderResults(raw) {
    // Filter by name
    var nameQ = (document.getElementById('name-filter').value || '').toLowerCase().trim();
    var monsters = nameQ
      ? raw.filter(function(m) { return (m.name || '').toLowerCase().indexOf(nameQ) !== -1; })
      : raw.slice();

    // Filter by style preference
    monsters = monsters.filter(function(m) {
      return styleMatchesWeakness(m.weakness, combatStyle);
    });

    // Filter by membership
    if (membersFilter === 'members') {
      monsters = monsters.filter(function(m) {
        var v = (m.members || '').toLowerCase();
        return v === 'yes' || v === 'true' || v === '1';
      });
    } else if (membersFilter === 'f2p') {
      monsters = monsters.filter(function(m) {
        var v = (m.members || '').toLowerCase();
        return v === 'no' || v === 'false' || v === '0' || v === '';
      });
    }

    // Filter by slayer level
    var slayerLvl = parseInt(document.getElementById('slayer').value) || 99;
    monsters = monsters.filter(function(m) {
      return (parseInt(m.slaylvl) || 0) <= slayerLvl;
    });

    // Filter by aggressiveness
    if (aggressiveFilter === 'yes') {
      monsters = monsters.filter(function(m) {
        var v = (m.aggressive || '').toLowerCase();
        return v === 'yes' || v === 'true' || v === '1';
      });
    }

    // Filter by poisonous
    if (poisonFilter === 'hide') {
      monsters = monsters.filter(function(m) {
        var v = (m.poisonous || '').toLowerCase();
        return v !== 'yes' && v !== 'true' && v !== '1';
      });
    }

    // Dedupe by name
    var seen = {};
    monsters = monsters.filter(function(m) {
      var key = (m.name || '').toLowerCase().trim();
      if (seen[key]) return false;
      seen[key] = true;
      return true;
    });

    // Sort
    var sort = document.getElementById('sort-select').value;
    var dir = sortDir === 'desc' ? -1 : 1;
    monsters.sort(function(a, b) {
      var r;
      if (sort === 'xp')   r = (parseFloat(a.experience) || 0) - (parseFloat(b.experience) || 0);
      else if (sort === 'hp')   r = (parseInt(a.lifepoints)   || 0) - (parseInt(b.lifepoints)   || 0);
      else if (sort === 'name') r = (a.name || '').localeCompare(b.name || '');
      else                      r = (parseInt(a.combat) || 0) - (parseInt(b.combat) || 0);
      return r * dir;
    });

    var sortLabels = { combat: 'combat level', xp: 'XP / kill', hp: 'life points', name: 'name' };
    var div = document.getElementById('results');

    if (monsters.length === 0) {
      div.innerHTML = '<div class="empty-state"><i class="ti ti-mood-sad"></i><p>No monsters found for these filters.<br>Try widening the level range or selecting "Any style".</p></div>';
      setStatus('No results found', false);
      return;
    }

    var shown = monsters.slice(0, 100);
    setStatus(monsters.length + ' monster' + (monsters.length !== 1 ? 's' : '') + ' found', true);
    document.getElementById('copy-link-btn').style.display = 'flex';

    div.innerHTML = '<p class="results-header">Showing ' + shown.length + ' of ' + monsters.length + ' monsters, sorted by ' + (sortLabels[sort] || 'combat level') + '</p>' +
      shown.map(function(m) {
        var name    = m.name || 'Unknown';
        var page    = m.page || name;
        var wikiUrl = 'https://runescape.wiki/w/' + encodeURIComponent(page.replace(/ /g, '_'));
        var combat  = m.combat || '?';
        var hp      = m.lifepoints ? Number(m.lifepoints).toLocaleString() : '?';
        var rawXp   = parseFloat(m.experience);
        var xp      = isNaN(rawXp) ? '?' : rawXp.toFixed(1);
        var locs    = (m.location || 'Unknown location').split(',').map(function(l) { return l.trim(); }).filter(Boolean);
        var slayLvl = m.slaylvl && m.slaylvl !== '0' ? m.slaylvl : null;

        var isMember = (m.members || '').toLowerCase();
        var isAggro  = (m.aggressive || '').toLowerCase();
        var isPoison = (m.poisonous || '').toLowerCase();

        var tags = [];
        if (isMember === 'yes' || isMember === 'true') tags.push({ text: 'Members', cls: 'tag-blue' });
        else tags.push({ text: 'F2P', cls: 'tag-green' });
        if (isAggro  === 'yes' || isAggro  === 'true') tags.push({ text: 'Aggressive', cls: 'tag-red' });
        if (isPoison === 'yes' || isPoison === 'true') tags.push({ text: 'Poisonous',  cls: 'tag-amber' });
        if (slayLvl) tags.push({ text: 'Slayer ' + slayLvl + '+', cls: 'tag-accent' });

        var tagHtml = tags.map(function(t) { return '<span class="tag ' + t.cls + '">' + t.text + '</span>'; }).join('');

        var imgSlug = m.img || page.replace(/_\([^)]+\)/g, '').replace(/_$/, '');
        var imgUrl  = 'https://runescape.wiki/images/' + imgSlug + '.png';

        return '<div class="enemy-card">' +
          '<div class="monster-img"><img src="' + imgUrl + '" alt="" loading="lazy" onerror="this.parentElement.style.display=\'none\'"></div>' +
          '<div>' +
            '<div class="enemy-name"><a href="' + wikiUrl + '" target="_blank" rel="noopener">' + name + ' <i class="ti ti-external-link" style="font-size:11px;opacity:.45" aria-hidden="true"></i></a></div>' +
            '<div class="enemy-meta"><i class="ti ti-map-pin" style="font-size:12px;vertical-align:-1px" aria-hidden="true"></i> ' + locs.map(function(l) { return '<a href="https://runescape.wiki/w/' + encodeURIComponent(l.replace(/ /g, '_')) + '" target="_blank" rel="noopener" class="loc-link">' + l + '</a>'; }).join('<span style="color:var(--text-muted)"> · </span>') + '</div>' +
            '<div class="tags">' + tagHtml + '</div>' +
          '</div>' +
          '<div class="stat-col">' +
            '<div class="stat-item"><div class="stat-label">Combat</div><div class="stat-val">' + combat + '</div></div>' +
            '<div class="stat-item"><div class="stat-label">HP</div><div class="stat-val">' + hp + '</div></div>' +
            '<div class="stat-item"><div class="stat-label">XP / kill</div><div class="stat-val">' + xp + '</div></div>' +
            '<div class="stat-item"><div class="stat-label">Weak to</div><div class="stat-val">' + weaknessBadge(m.weakness) + '</div></div>' +
          '</div>' +
        '</div>';
      }).join('');
  }

  var STORAGE_KEY = 'rs3finder_v1';

  function saveState() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        combat: document.getElementById('combat').value,
        atk:    document.getElementById('atk').value,
        str:    document.getElementById('str').value,
        def:    document.getElementById('def').value,
        hp:     document.getElementById('hp').value,
        pray:   document.getElementById('pray').value,
        ranged: document.getElementById('ranged').value,
        magic:  document.getElementById('magic').value,
        minlvl: document.getElementById('minlvl').value,
        maxlvl: document.getElementById('maxlvl').value,
        slayer: document.getElementById('slayer').value,
        name:   document.getElementById('name-filter').value,
        sort:   document.getElementById('sort-select').value,
        combatStyle:      combatStyle,
        membersFilter:    membersFilter,
        aggressiveFilter: aggressiveFilter,
        poisonFilter:     poisonFilter,
        sortDir:          sortDir
      }));
    } catch(e) {}
  }

  function loadState() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return false;
      var s = JSON.parse(raw);
      ['combat','atk','str','def','hp','pray','ranged','magic','minlvl','maxlvl','slayer'].forEach(function(id) {
        if (s[id] !== undefined) document.getElementById(id).value = s[id];
      });
      if (s.name !== undefined) document.getElementById('name-filter').value = s.name;
      if (s.sort !== undefined) document.getElementById('sort-select').value = s.sort;
      if (s.combatStyle) {
        combatStyle = s.combatStyle;
        document.getElementById('style-group').querySelectorAll('.btn-toggle').forEach(function(b) {
          b.classList.toggle('active', b.dataset.val === s.combatStyle);
        });
      }
      if (s.membersFilter) {
        membersFilter = s.membersFilter;
        document.getElementById('members-group').querySelectorAll('.btn-toggle').forEach(function(b) {
          b.classList.toggle('active', b.dataset.val === s.membersFilter);
        });
      }
      if (s.aggressiveFilter) {
        aggressiveFilter = s.aggressiveFilter;
        document.getElementById('aggro-group').querySelectorAll('.btn-toggle').forEach(function(b) {
          b.classList.toggle('active', b.dataset.val === s.aggressiveFilter);
        });
      }
      if (s.poisonFilter) {
        poisonFilter = s.poisonFilter;
        document.getElementById('poison-group').querySelectorAll('.btn-toggle').forEach(function(b) {
          b.classList.toggle('active', b.dataset.val === s.poisonFilter);
        });
      }
      if (s.sortDir) {
        sortDir = s.sortDir;
        document.getElementById('sort-dir-btn').innerHTML = sortDir === 'asc' ? '&#9650;' : '&#9660;';
      }
      return true;
    } catch(e) { return false; }
  }

  ['combat','atk','str','def','hp','pray','ranged','magic','minlvl','maxlvl','slayer'].forEach(function(id) {
    var el = document.getElementById(id);
    el.addEventListener('input', function() {
      var min = parseFloat(el.min), max = parseFloat(el.max), val = parseFloat(el.value);
      if (!isNaN(max) && val > max) el.value = max;
      if (!isNaN(min) && val < min) el.value = min;
      saveState();
    });
  });
  document.getElementById('name-filter').addEventListener('input', saveState);
  document.getElementById('sort-select').addEventListener('change', saveState);

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !document.getElementById('find-btn').disabled) findEnemies();
  });

  function resetFilters() {
    document.getElementById('minlvl').value = 1;
    document.getElementById('maxlvl').value = 200;
    document.getElementById('slayer').value = 99;
    document.getElementById('name-filter').value = '';
    document.getElementById('sort-select').value = 'combat';
    combatStyle = 'any';
    membersFilter = 'any';
    aggressiveFilter = 'any';
    poisonFilter = 'any';
    sortDir = 'asc';
    document.getElementById('sort-dir-btn').innerHTML = '&#9650;';
    ['style-group','members-group','aggro-group','poison-group'].forEach(function(gid) {
      var btns = document.getElementById(gid).querySelectorAll('.btn-toggle');
      btns.forEach(function(b) { b.classList.toggle('active', b.dataset.val === 'any'); });
    });
    localStorage.removeItem(STORAGE_KEY);
    findEnemies();
  }

  function suggestLevelRange() {
    var lvl = parseInt(document.getElementById('combat').value) || 50;
    document.getElementById('minlvl').value = Math.max(1, Math.floor(lvl * 0.5));
    document.getElementById('maxlvl').value = Math.min(10000, Math.ceil(lvl * 1.1));
    saveState();
  }

  function updateUrl() {
    var params = new URLSearchParams();
    params.set('minlvl', document.getElementById('minlvl').value);
    params.set('maxlvl', document.getElementById('maxlvl').value);
    if (combatStyle      !== 'any')  params.set('style',   combatStyle);
    if (membersFilter    !== 'any')  params.set('members', membersFilter);
    if (aggressiveFilter !== 'any')  params.set('aggro',   aggressiveFilter);
    if (poisonFilter     !== 'any')  params.set('poison',  poisonFilter);
    if (sortDir          !== 'asc')  params.set('dir',     sortDir);
    var sort = document.getElementById('sort-select').value;
    if (sort !== 'combat') params.set('sort', sort);
    var slayer = parseInt(document.getElementById('slayer').value);
    if (slayer && slayer < 99) params.set('slayer', slayer);
    var name = document.getElementById('name-filter').value.trim();
    if (name) params.set('name', name);
    history.replaceState(null, '', '?' + params.toString());
  }

  function copyLink() {
    var url = window.location.href;
    var btn = document.getElementById('copy-link-btn');
    function flash() {
      var orig = btn.innerHTML;
      btn.innerHTML = '<i class="ti ti-check" style="font-size:12px"></i> Copied!';
      setTimeout(function() { btn.innerHTML = orig; }, 2000);
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(url).then(flash).catch(function() {
        var ta = document.createElement('textarea');
        ta.value = url; document.body.appendChild(ta); ta.select();
        document.execCommand('copy'); document.body.removeChild(ta); flash();
      });
    } else {
      var ta = document.createElement('textarea');
      ta.value = url; document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); document.body.removeChild(ta); flash();
    }
  }

  function applyUrlParams() {
    var params = new URLSearchParams(window.location.search);
    if (!params.toString()) return false;
    if (params.get('minlvl')) document.getElementById('minlvl').value = params.get('minlvl');
    if (params.get('maxlvl')) document.getElementById('maxlvl').value = params.get('maxlvl');
    if (params.get('slayer')) document.getElementById('slayer').value = params.get('slayer');
    if (params.get('name'))   document.getElementById('name-filter').value = params.get('name');
    if (params.get('sort'))   document.getElementById('sort-select').value = params.get('sort');
    if (params.get('style')) {
      combatStyle = params.get('style');
      document.getElementById('style-group').querySelectorAll('.btn-toggle').forEach(function(b) {
        b.classList.toggle('active', b.dataset.val === combatStyle);
      });
    }
    if (params.get('members')) {
      membersFilter = params.get('members');
      document.getElementById('members-group').querySelectorAll('.btn-toggle').forEach(function(b) {
        b.classList.toggle('active', b.dataset.val === membersFilter);
      });
    }
    if (params.get('aggro')) {
      aggressiveFilter = params.get('aggro');
      document.getElementById('aggro-group').querySelectorAll('.btn-toggle').forEach(function(b) {
        b.classList.toggle('active', b.dataset.val === aggressiveFilter);
      });
    }
    if (params.get('poison')) {
      poisonFilter = params.get('poison');
      document.getElementById('poison-group').querySelectorAll('.btn-toggle').forEach(function(b) {
        b.classList.toggle('active', b.dataset.val === poisonFilter);
      });
    }
    if (params.get('dir')) {
      sortDir = params.get('dir');
      document.getElementById('sort-dir-btn').innerHTML = sortDir === 'asc' ? '&#9650;' : '&#9660;';
    }
    return true;
  }

  var hasUrlParams = applyUrlParams();
  if (!hasUrlParams) loadState();
  if (hasUrlParams || localStorage.getItem(STORAGE_KEY)) findEnemies();
</script>
</body>
</html>
